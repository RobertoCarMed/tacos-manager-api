name: Backend CI

on:
  pull_request:
    branches:
      - dev
      - qa
      - main
  push:
    branches:
      - dev
      - qa
      - main

jobs:
  validate:
    name: Lint · Build · Validate
    runs-on: ubuntu-latest

    # prisma generate (postinstall) y prisma validate leen prisma.config.ts,
    # que llama env('DATABASE_URL'). No se conecta a ninguna BD real en CI —
    # el valor dummy satisface la resolución de la variable sin acceso a red.
    env:
      DATABASE_URL: postgresql://prisma:prisma@localhost:5432/ci_dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Prisma validate
        run: pnpm exec prisma validate

  health-check-qa:
    name: Health Check QA
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/qa'

    steps:
      - name: Health Check QA
        env:
          QA_API_URL: ${{ vars.QA_API_URL }}
        run: |
          if [ -z "$QA_API_URL" ]; then
            echo "::error::QA_API_URL no está configurada en las variables del repositorio de GitHub"
            exit 1
          fi
          response=$(curl -sf "$QA_API_URL/health") || {
            echo "::error::Health check fallido: el endpoint no es alcanzable o devolvió un error HTTP"
            exit 1
          }
          status=$(echo "$response" | jq -r '.status')
          if [ "$status" != "ok" ]; then
            echo "::error::Health check fallido: se esperaba status=ok, se obtuvo status=$status"
            echo "Respuesta completa: $response"
            exit 1
          fi
          echo "Health check exitoso — status=$status"

  # ---------------------------------------------------------------------------
  # Production Health Check — pendiente de infraestructura
  # ---------------------------------------------------------------------------
  # Conectar aquí cuando el ambiente de producción en Railway esté disponible.
  #
  # Trigger:   push → main  (después de que validate pase)
  # Condición: github.event_name == 'push' && github.ref == 'refs/heads/main'
  # Variable:  PROD_API_URL  (GitHub Variables — Settings → Actions → Variables)
  # Validación: GET $PROD_API_URL/health → { status: "ok" }
  #
  # El job seguirá el mismo patrón que health-check-qa:
  #   needs: validate
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  # ---------------------------------------------------------------------------
